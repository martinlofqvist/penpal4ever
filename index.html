<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PenPal4ever</title>
  <meta name="description" content="A place for creatives to correspond visually by interpreting a shared theme." />
  <link rel="stylesheet" href="./css/main.css" />
  <link rel="stylesheet" href="./css/modal.css" />
</head>
<body>

  <div class="layout">

    <!-- Left panel -->
    <div class="panel panel--left">

      <header class="headline">
        <p class="headline__eyebrow">YOU ARE MY</p>
        <h1 class="headline__title">PENPAL4EVER</h1>
      </header>

      <main class="copy">
        <p class="copy__line"><a href="#">A place for creatives to correspond.</a></p>
        <p class="copy__line"><a href="#">One theme, two interpretations, an ongoing exchange.</a></p>
        <p class="copy__line"><a href="#">Invite your penpal and start your correspondance today.</a></p>
      </main>

      <footer class="site-footer">
        <a class="footer__about" href="./about.html">ABOUT</a>
      </footer>

    </div>

    <!-- Right panel -->
    <div class="panel panel--right">
      <canvas id="animation-canvas"></canvas>
      <div class="panel__buttons">
        <a href="#" class="btn btn--primary">NEW PENPAL</a>
        <a href="#" class="btn btn--secondary">CONTINUE PENPAL</a>
      </div>
    </div>

  </div>

  <script src="./js/animation.js"></script>
  <script src="./js/modal.js"></script>

  <!-- ─── New Penpal modal ─── -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <button class="modal__close" id="modal-close" aria-label="Close">✕</button>
      <h2 class="modal__title" id="modal-title">NEW PENPAL</h2>
      <p class="modal__subtitle">START A VISUAL CORRESPONDENCE</p>

      <form id="penpal-form" novalidate>
        <div class="modal__field">
          <label class="modal__label" for="input-your-name">Your name</label>
          <input class="modal__input" id="input-your-name" type="text" placeholder="Martin" autocomplete="off" required />
        </div>
        <div class="modal__field">
          <label class="modal__label" for="input-penpal-name">Your penpal's name</label>
          <input class="modal__input" id="input-penpal-name" type="text" placeholder="Daniel" autocomplete="off" required />
        </div>
        <button class="modal__submit" type="submit">START CORRESPONDENCE →</button>
      </form>
    </div>
  </div>

</body>
</html>
