<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PenPal4ever</title>
  <meta name="description" content="A place for creatives to correspond visually by interpreting a shared theme." />
  <link rel="stylesheet" href="./css/main.css" />
  <link rel="stylesheet" href="./css/modal.css" />
</head>
<body>

  <div class="home">

    <!-- Animation area — right side, starts at ~48% -->
    <div class="anim-area">
      <canvas id="animation-canvas"></canvas>
      <div class="home-buttons">
        <a href="./theme.html" class="btn btn--primary">NEW PENPAL</a>
        <a href="./theme.html" class="btn btn--secondary">CONTINUE PENPAL</a>
      </div>
    </div>

    <!-- Headline — full-width overlay -->
    <div class="home-headline">
      <p class="home-eyebrow">YOU ARE MY</p>
      <h1 class="home-title">PENPAL4EVER</h1>
    </div>

    <!-- Copy — left side -->
    <main class="home-copy">
      <p><a href="#">A place for creatives to correspond.</a></p>
      <p><a href="#">One theme, two interpretations, an ongoing exchange.</a></p>
      <p><a href="#">Invite your penpal and start your correspondance today.</a></p>
    </main>

    <!-- About — bottom left -->
    <footer class="home-footer">
      <a href="./about.html">ABOUT</a>
    </footer>

  </div>

  <script src="./js/animation.js"></script>
  <script src="./js/modal.js"></script>

  <!-- New Penpal modal -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <button class="modal__close" id="modal-close" aria-label="Close">✕</button>
      <h2 class="modal__title" id="modal-title">NEW PENPAL</h2>
      <p class="modal__subtitle">START A VISUAL CORRESPONDENCE</p>
      <form id="penpal-form" novalidate>
        <div class="modal__field">
          <label class="modal__label" for="input-your-name">Your name</label>
          <input class="modal__input" id="input-your-name" type="text" placeholder="Martin" autocomplete="off" required />
        </div>
        <div class="modal__field">
          <label class="modal__label" for="input-penpal-name">Your penpal's name</label>
          <input class="modal__input" id="input-penpal-name" type="text" placeholder="Daniel" autocomplete="off" required />
        </div>
        <button class="modal__submit" type="submit">START CORRESPONDENCE →</button>
      </form>
    </div>
  </div>

</body>
</html>
