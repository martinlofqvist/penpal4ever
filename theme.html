<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PenPal4ever</title>
  <link rel="stylesheet" href="./css/main.css" />
  <link rel="stylesheet" href="./css/theme.css" />
</head>
<body>

  <!-- ─── NEW THEME intro overlay ─── -->
  <div class="intro" id="intro">
    <div class="intro__block" id="intro-block">
      <p class="theme-label">
        <span>THE</span><span class="label-ordinal" id="intro-ordinal"></span><span>THEME</span><span>IS</span>
      </p>
      <h1 class="theme-title" id="intro-title">—</h1>
    </div>
  </div>

  <!-- ─── CURRENT THEME layout ─── -->
  <div class="ct-layout" id="ct-layout">

    <div class="barn-wrap" id="barn-wrap">

      <!-- Left door -->
      <div class="barn-door barn-door--left" id="door-left">
        <div class="contributor">
          <h3 class="contributor__name" id="name-left">—</h3>

          <div class="contributor__frame" id="frame-left">
            <!-- Upload zone (shown when no image) -->
            <div class="upload-zone" id="upload-zone-left" title="Upload your response">
              <svg class="upload-zone__icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M32 32L24 24L16 32" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M24 24V42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M40.7 36.7A10 10 0 0 0 34 18h-2.52A16 16 0 1 0 6 32.4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <p class="upload-zone__label">UPLOAD YOUR RESPONSE</p>
              <p class="upload-zone__sub">JPG · PNG · GIF · WEBP · up to 25MB</p>
              <input type="file" id="file-input-left" accept="image/*" hidden />
            </div>
            <!-- Image (shown after upload) -->
            <img class="contributor__image" id="image-left" src="" alt="" hidden />
          </div>

          <p class="contributor__caption" id="caption-left"></p>
        </div>
      </div>

      <!-- Right door -->
      <div class="barn-door barn-door--right" id="door-right">
        <div class="contributor">
          <h3 class="contributor__name" id="name-right">—</h3>

          <div class="contributor__frame" id="frame-right">
            <!-- Upload zone -->
            <div class="upload-zone" id="upload-zone-right" title="Upload your response">
              <svg class="upload-zone__icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M32 32L24 24L16 32" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M24 24V42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M40.7 36.7A10 10 0 0 0 34 18h-2.52A16 16 0 1 0 6 32.4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <p class="upload-zone__label">UPLOAD YOUR RESPONSE</p>
              <p class="upload-zone__sub">JPG · PNG · GIF · WEBP · up to 25MB</p>
              <input type="file" id="file-input-right" accept="image/*" hidden />
            </div>
            <!-- Image -->
            <img class="contributor__image" id="image-right" src="" alt="" hidden />
          </div>

          <p class="contributor__caption" id="caption-right"></p>
        </div>
      </div>

    </div><!-- /barn-wrap -->

    <!-- Header overlay -->
    <header class="ct-header">
      <div class="ct-header__text">
        <p class="theme-label">
          <span>THE</span><span class="label-ordinal" id="label-ordinal"></span><span>THEME</span><span>IS</span>
        </p>
        <h1 class="theme-title ct-theme-title" id="ct-title">—</h1>
      </div>
      <div class="ct-header__nav">
        <button class="nav-btn nav-btn--prev" id="btn-prev" aria-label="Previous theme">
          <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
            <path d="M6 1L1 6L6 11" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="nav-btn nav-btn--next" id="btn-next" aria-label="Next theme">
          <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
            <path d="M1 1L6 6L1 11" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

  </div><!-- /ct-layout -->

  <!-- ─── Session info bar ─── -->
  <div class="session-bar" id="session-bar" hidden>
    <span id="session-names">—</span>
    <span class="session-bar__id" id="session-id-display"></span>
    <button class="session-bar__copy" id="btn-copy-link" title="Copy session link">COPY LINK</button>
  </div>

  <script src="./js/label.js"></script>
  <script src="./js/theme.js"></script>
</body>
</html>
